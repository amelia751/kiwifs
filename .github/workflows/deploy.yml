name: deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 093955289594.dkr.ecr.us-east-1.amazonaws.com
  ECR_REPOSITORY: kiwifs
  EC2_HOST: kiwifs.example.com
  EC2_USER: ec2-user
  CONTAINER_NAME: kiwifs
  HOST_PORT: 3333
  CONTAINER_PORT: 3333
  DATA_DIR: /data/knowledge

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
      - run: go vet ./...
      - run: go test ./... -race -count=1
      - run: go build -o /tmp/kiwifs .

  build-and-push:
    name: build and push to ECR
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Compute image tag
        id: meta
        run: |
          SHORT_SHA=$(echo "${GITHUB_SHA}" | cut -c1-7)
          echo "image_tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: deploy to EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ${{ env.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: ECR_REGISTRY,ECR_REPOSITORY,AWS_REGION,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,DATA_DIR
          script: |
            set -euo pipefail
            sudo aws ecr get-login-password --region "$AWS_REGION" \
              | sudo docker login --username AWS --password-stdin "$ECR_REGISTRY"
            sudo docker pull "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            sudo docker stop "$CONTAINER_NAME" 2>/dev/null || true
            sudo docker rm "$CONTAINER_NAME" 2>/dev/null || true
            sudo docker run -d \
              --name "$CONTAINER_NAME" \
              --restart always \
              -p "$HOST_PORT:$CONTAINER_PORT" \
              -v "$DATA_DIR:/data" \
              "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
            sudo docker image prune -f

      - name: Smoke test /health
        run: |
          for i in $(seq 1 20); do
            if curl -fsS --max-time 5 "http://${EC2_HOST}:${HOST_PORT}/health" > /dev/null; then
              echo "health OK"
              exit 0
            fi
            sleep 2
          done
          echo "health check failed"
          exit 1
